name: Build deck

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build the deck
        run: node build.js

      - name: Upload deck artifact
        uses: actions/upload-artifact@v4
        with:
          name: Paytm_Velocity_API_Campaign_Brief
          path: Paytm_Velocity_API_Campaign_Brief.pptx
